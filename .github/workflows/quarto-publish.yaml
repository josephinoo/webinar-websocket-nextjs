name: Render and Publish Quarto Slides Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'slides/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto
        run: quarto render slides/whatsapp-chat.qmd
        
      - name: Prepare Site
        run: |
          mkdir _site
          mv slides/whatsapp-chat.html _site/index.html
          if [ -d "slides/whatsapp-chat_files" ]; then mv slides/whatsapp-chat_files _site/; fi
          cp slides/*.png slides/*.mp4 slides/*.avif _site/ 2>/dev/null || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
